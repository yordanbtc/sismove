<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SOS Sismo VE - Emergencia</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <header>
        <h1>🚨 SOS Sismo VE</h1>
        <p>Búsqueda de Desaparecidos y Coordinación de Ayuda TERREMOTO 24JUN2026</p>
        <p>yordanbtc.github.io</p>
    </header>
    
    <div id="stats-container" class="stats-bar">
        Des: <span id="count-missing">0</span> | 
        Enc: <span id="count-found">0</span> | 
        Fall: <span id="count-dead">0</span>
    </div>

    <div class="view-selector">
        <button id="btn-view-missing" onclick="switchView('missing')">Desaparecidos</button>
        <button id="btn-view-help" class="active" onclick="switchView('help')">Solicitudes de Ayuda</button>
    </div>

    <main>
        <section id="search-section">
            <h2>Buscar Persona</h2>
            <input type="text" id="search-input" placeholder="Escribe nombre o apellido para buscar...">
            <div id="results-container">
                <p class="info-text">Cargando reportes...</p>
            </div>
        </section>

        <section id="actions-section">
            <button class="btn btn-danger" onclick="openModal('modal-missing')">📢 Reportar Caso</button>
            <button class="btn btn-warning" onclick="openModal('modal-help')">📦 Solicitar Ayuda</button>
        </section>

        <div id="modal-container"></div>

        <div id="pagination-container">
            <button id="prev-page">Anterior</button>
            <span id="page-info">Página 1</span>
            <button id="next-page">Siguiente</button>
        </div>
    </main>

    <footer style="text-align: center; padding: 20px; font-size: 0.8rem; color: #666;">
        <a href="README.md" target="_blank" style="color: #b71c1c;">Declaración de Responsabilidad y Uso</a>
    </footer>

    <!-- Bloque de configuración corregido -->
    <script>
        if (location.hostname === "localhost" || location.hostname === "127.0.0.1") {
            // En local sigue cargando tu archivo de configuración
            document.write('<script src="config.js"><\/script>');
        } else {
            // Estos son los marcadores que tu comando sed está buscando
            window.SUPABASE_URL = "process.env.SUPABASE_URL";
            window.SUPABASE_ANON_KEY = "process.env.SUPABASE_ANON_KEY";
        }
    </script>
    
    <!-- Cargamos la lógica después de definir las variables -->
    <script src="app.js"></script>
</body>
</html>
